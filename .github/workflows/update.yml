name: Update AI-Manifold Data

# cron-job.org から JST 05:30 に workflow_dispatch をトリガーする(内蔵スケジュールなし)
# ※内蔵 schedule を残すと外部cronと二重起動になるため削除済み。
on:
  workflow_dispatch:

concurrency:
  group: update-ai-manifold-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run build_data.py
        run: python build_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update data.json $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin master
            git push
          fi
