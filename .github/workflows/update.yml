name: Update AI-Manifold Data

on:
  schedule:
    - cron: '30 20 * * 0-4'  # Mon-Fri 5:30 JST (= Sun-Thu 20:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run build_data.py
        run: python build_data.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update data.json $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
